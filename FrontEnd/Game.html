<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Oort outposts</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style type="text/css">
        html, body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
            box-sizing: border-box;

            font-family: "Orbitron";
            letter-spacing: 0.05em;
            font-size: small;
            background-color: black;

            user-select: none;
        }

        html ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgb(220,220,220);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgb(255,255,255);
        }

        p{
            margin: 0;
            color: white;
        }
        #gameDiv{
            width: 100%;
            height: 100%;
            margin: 0;
        }
    </style>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <!-- Style sheets -->
    <link rel="stylesheet" href="WebPage/Style/UI.css">
    <link rel="stylesheet" href="WebPage/Style/UI_Asteroid.css">
</head>
<body>
    <div id="mainDiv"></div>
    <script type="text/javascript" src="Game_data/GameConfig.js"></script>
    <script type="module" src="WebPage/Scripts/Game.js"></script>

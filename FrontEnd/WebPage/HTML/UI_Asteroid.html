<div id="View_Asteroid">
    <div id="LeftPanel">
        <div class="UI_Frame" id="RessourcesDiv">
            <div class="UI_Ressource" id="ressourceMinerals">
                <img class="UI_RessourceImg" src="./WebPage/Media/Ressources/MINERALS.png">
                <p class="UI_RessourceP"></p>
            </div>
            <div class="UI_Ressource" id="ressourceWater">
                <img class="UI_RessourceImg" src="./WebPage/Media/Ressources/WATER.png">
                <p class="UI_RessourceP"></p>
            </div>
            <div class="UI_Ressource" id="ressourceEnergy">
                <img class="UI_RessourceImg" src="./WebPage/Media/Ressources/ENERGY.png">
                <p class="UI_RessourceP"></p>
            </div>
        </div>

        <div class="UI_Column" id="TopTexts">
            <div class="UI_Row" id="AsteroidNameDiv">
                <p id="AsteroidName">Asteroid name</p>        
            </div>
            <div class="UI_Row" id="TimeStampDiv">
                <p id="TimeStamp">Timestamp</p>        
            </div>
        </div>
    </div>
    <div id="RightPanel">
        <div id="RightPanelContent">
            <div class="UI_TabView" id="RightTabView">
                <div class="UI_TabViewButtonsDiv" id="RightPanelButtonsDiv"></div>
                <div class="UI_TabViewContent">

                    <div id="LogPanel" class="UI_Timeline UI_TabViewContentChild">
                        <div class="UI_Factory UI_TimelineStep LogEventsItem" id="LogEventItemFactory">
                            <div class="UI_TimelineStepPoint"></div>
                            <p class="LogEventTimeText"></p>
                            <p class="LogEventText"></p>
                        </div>
                        <div class="UI_TimelineLineDiv">
                            <div class="UI_TimelineLine"></div>
                        </div>
                    </div>
        
                    <div id="ConstructionsQueuePanel" class="UI_TabViewContentChild">
                        <p class="QueueStatusLabel" id="ConstructionsQueueLabel"></p>
                        <div class="UI_Scroller" id="ConstructionQueueScroller">
                            <div id="ConstructionQueueList" class="UI_Timeline">
                                <div class="UI_Factory UI_TimelineStep QueueItem" id="QueueItemFactory">
                                    <div class="UI_TimelineStepPoint"></div>
                                    <div class="Miniature">
                                        <img src="NO_IMAGE"/>
                                        <p class="DurationText"></p>
                                    </div>
                                    <div class="RightPanel">
                                        <p class="Name"></p>
                                        <div class="ButtonsPanel">
                                            <div class="UI_Button"><p>△</p></div>
                                            <div class="UI_Button"><p>▽</p></div>
                                            <div class="UI_Button"><p>⨯</p></div>
                                        </div>
                                    </div>
                                </div>
        
                                <div class="UI_TimelineLineDiv">
                                    <div class="UI_TimelineLine"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="UI_Scroller UI_TabViewContentChild" id="ConstructionsPickPanel">
                        <div class="PicksDiv" id="ConstructionPicksDiv">
                            <div class="UI_Factory PickItem" id="PickItemFactory">
                                <div class="ButtonCentralizer">
                                    <div class="UI_Button">
                                        <p class="AddToQueueButtonText"></p>
                                    </div>
                                </div>
                                <div class="RightPanel">
                                    <div class="TopPanel">
                                        <div class="Miniature">
                                            <img src="NO_IMAGE"/>
                                            <p class="DurationText"></p>
                                        </div>
                                        <div class="TextsDiv">
                                            <p class="Name"></p>
                                            <p class="Description"></p>
                                        </div>
                                    </div>
                                    <div class="NumberFramesDiv">
                                        <div class="UI_Factory NumberFrameDiv" id="NumberFrameFactory">
                                            <p class="NumberFrameTitle"></p>
                                            <div class="NumberFrameContent">
                                                <div class="UI_Factory UI_Ressource" id="NumberFrameRessourceFactory">
                                                    <img class="UI_RessourceImg" src="RESSOURCE.jpg">
                                                    <p class="UI_RessourceP"></p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="UI_Scroller UI_TabViewContentChild" id="ShipyardPanel">
                        <div class="PicksDiv" id="SpaceshipPicksDiv">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
